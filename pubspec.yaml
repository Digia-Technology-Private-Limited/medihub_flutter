name: medihub
description: A professional e-commerce app for MediHub health and fitness products.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.0

  # Networking
  http: ^1.2.0
  intl: ^0.19.0

  # Local Storage
  shared_preferences: ^2.2.0

  # UI Components
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  fluttertoast: ^8.2.0

  # Analytics
  flutter_svg: ^2.2.3

  # Digia SDK — server-driven UI + CEP overlay engine
  digia_ui:
    path: ../digia_engage/flutter

  # MoEngage CEP plugin for Digia
  digia_moengage_plugin:
    path: ../digia_moengage_plugin

  # MoEngage Flutter SDK (direct dep so MoEngageFlutter can be used in app code)
  moengage_flutter: ^10.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
